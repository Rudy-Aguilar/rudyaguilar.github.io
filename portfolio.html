<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portafolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

background:

linear-gradient(
135deg,
#0f172a,
#1e293b
);

color:white;

padding:50px;

overflow-x:hidden;

}

.titulo{

text-align:center;

font-size:48px;

font-weight:700;

margin-bottom:50px;

}

.wrapper{

position:relative;

}

.galeria{

display:flex;

gap:30px;

overflow-x:auto;

scroll-behavior:smooth;

padding:20px;

scrollbar-width:none;

}

.galeria::-webkit-scrollbar{

display:none;

}

.card{

min-width:380px;

background:

rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:

1px solid rgba(255,255,255,.1);

border-radius:25px;

overflow:hidden;

transition:.4s;

box-shadow:

0 10px 40px rgba(0,0,0,.3);

}

.card:hover{

transform:

translateY(-10px)
scale(1.02);

}

.card img{

width:100%;

height:250px;

object-fit:cover;

}

.info{

padding:25px;

}

.info h2{

margin-bottom:10px;

}

.info p{

opacity:.8;

line-height:1.5;

}

.btn{

margin-top:20px;

display:inline-block;

padding:12px 20px;

border-radius:50px;

background:white;

color:black;

text-decoration:none;

font-weight:bold;

}

.flecha{

position:absolute;

top:50%;

transform:translateY(-50%);

width:60px;

height:60px;

border:none;

border-radius:50%;

background:

rgba(255,255,255,.15);

color:white;

font-size:30px;

cursor:pointer;

backdrop-filter:blur(20px);

z-index:5;

}

.left{

left:-20px;

}

.right{

right:-20px;

}

@media(max-width:768px){

.card{

min-width:280px;

}

.titulo{

font-size:34px;

}

}

</style>

</head>

<body>

<h1 class="titulo">

MIS TRABAJOS

</h1>

<div class="wrapper">

<button class="flecha left">

❮

</button>

<div class="galeria" id="galeria">

<div class="card">

<img src="images/Portadas.jpg" alt="Portadas">

<div class="info">

<h2>Portadas de Libros</h2>

<p>

Portadas para libros educativos

</p>

<a class="btn">

Ver Proyecto

</a>

</div>

</div>

<div class="card">

<img src="images/Catalogos.jpg" alt="Catalogos">

<div class="info">

<h2>Catalogos Recientes</h2>

<p>

Posicionamiento y variabilidad en productos de tecnología.

</p>

<a class="btn">

Ver Proyecto

</a>

</div>

</div>

<div class="card">

<img src="img3.jpg">

<div class="info">

<h2>Mantenimiento Completo</h2>

<p>

Servicio preventivo y correctivo.

</p>

<a class="btn">

Ver Proyecto

</a>

</div>

</div>

</div>

<button class="flecha right">

❯

</button>

</div>

<canvas id="particles"></canvas>

<script>

const galeria =
document.getElementById("galeria");

document
.querySelector(".right")
.onclick=()=>{

galeria.scrollLeft +=450;

}

document
.querySelector(".left")
.onclick=()=>{

galeria.scrollLeft -=450;

}


/* PARTICULAS */

const canvas =
document.getElementById("particles");

const ctx =
canvas.getContext("2d");

canvas.width=
window.innerWidth;

canvas.height=
window.innerHeight;

let particles=[];

class Particle{

constructor(){

this.x=
Math.random()*canvas.width;

this.y=
Math.random()*canvas.height;

this.size=
Math.random()*3+1;

this.speedX=
(Math.random()-.5)*0.7;

this.speedY=
(Math.random()-.5)*0.7;

}

update(){

this.x+=this.speedX;

this.y+=this.speedY;

if(this.x>canvas.width||this.x<0)
this.speedX*=-1;

if(this.y>canvas.height||this.y<0)
this.speedY*=-1;

}

draw(){

ctx.beginPath();

ctx.arc(
this.x,
this.y,
this.size,
0,
Math.PI*2
);

ctx.fillStyle=
"rgba(255,255,255,.7)";

ctx.fill();

}

}

function init(){

particles=[];

for(let i=0;i<100;i++){

particles.push(
new Particle()
);

}

}

function connect(){

for(let a=0;a<particles.length;a++){

for(let b=a;b<particles.length;b++){

let dx=
particles[a].x-
particles[b].x;

let dy=
particles[a].y-
particles[b].y;

let distance=
dx*dx+dy*dy;

if(distance<15000){

ctx.strokeStyle=
"rgba(255,255,255,.08)";

ctx.lineWidth=1;

ctx.beginPath();

ctx.moveTo(
particles[a].x,
particles[a].y
);

ctx.lineTo(
particles[b].x,
particles[b].y
);

ctx.stroke();

}

}

}

}

function animate(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

particles.forEach(p=>{

p.update();

p.draw();

});

connect();

requestAnimationFrame(
animate
);

}

window.addEventListener(
"resize",
()=>{

canvas.width=
window.innerWidth;

canvas.height=
window.innerHeight;

init();

}
);

init();

animate();

</script>

</script>

</body>

</html>
